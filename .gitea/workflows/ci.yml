name: SSD CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate docker-compose.yml
        run: docker compose config

      - name: Bring the stack up
        run: docker compose up -d

      - name: Verify web server over HTTPS with basic auth
        run: |
          for i in $(seq 1 30); do
            if curl -sk https://127.0.0.1 >/dev/null; then break; fi
            sleep 2
          done
          # unauthenticated request must be rejected
          code=$(curl -sk -o /dev/null -w '%{http_code}' https://127.0.0.1)
          test "$code" = "401"
          # authenticated request must succeed
          code=$(curl -sk -o /dev/null -w '%{http_code}' \
            -u admin:2400639@SIT.singaporetech.edu.sg https://127.0.0.1)
          test "$code" = "200"

      - name: Verify search validation
        run: |
          AUTH="-sk -u admin:2400639@SIT.singaporetech.edu.sg"

          # The form is CSRF protected, so each submission needs a token taken
          # from the page, sent back on the same cookie session.
          submit() {
            jar=$(mktemp)
            token=$(curl $AUTH -c "$jar" https://127.0.0.1/ \
              | sed -n 's/.*name="csrf_token" value="\([^"]*\)".*/\1/p')
            curl $AUTH -b "$jar" -X POST \
              --data-urlencode "csrf_token=$token" \
              --data-urlencode "q=$1" https://127.0.0.1/
          }

          # a clean term reaches the result page
          submit 'hello world' | grep -q 'You searched for'
          # SQL injection and XSS are rejected and stay on the form
          for payload in "' OR 1=1--" "<script>alert(1)</script>"; do
            submit "$payload" | grep -q 'Invalid input detected'
          done
          # length bounds
          submit 'ab' | grep -q '3-50 characters'
          # a post with no CSRF token is refused
          test "$(curl $AUTH -o /dev/null -w '%{http_code}' \
            -X POST -d 'q=hello world' https://127.0.0.1/)" = "400"

      - name: Verify only validated queries are logged
        run: |
          rows=$(docker compose exec -T db psql -U ssd -d ssd -tAc \
            'SELECT count(*) FROM "2400639"')
          test "$rows" = "1"

      - name: Verify Gitea is reachable
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:3000/api/healthz >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Gitea did not come up in time" >&2
          exit 1

      - name: Tear down
        if: always()
        run: docker compose down -v
